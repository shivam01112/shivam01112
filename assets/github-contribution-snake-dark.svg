<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated GitHub contribution snake</title>
  <desc id="desc">A colorful animated contribution snake placeholder that is replaced by GitHub Actions.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617" />
      <stop offset="0.54" stop-color="#071B2D" />
      <stop offset="1" stop-color="#042F2E" />
    </linearGradient>
    <linearGradient id="snake" x1="90" y1="130" x2="1080" y2="190" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" />
      <stop offset="0.48" stop-color="#22C55E" />
      <stop offset="1" stop-color="#FBBF24" />
    </linearGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <rect x="8" y="8" width="16" height="16" rx="5" fill="#1E293B" opacity="0.9" />
    </pattern>
    <filter id="glow" x="-30%" y="-70%" width="160%" height="240%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="34" fill="url(#bg)" />
  <text x="72" y="68" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900">Contribution Snake</text>
  <text x="72" y="98" fill="#94A3B8" font-family="Inter, Arial, sans-serif" font-size="16">This preview becomes your real GitHub contribution snake after Actions runs.</text>

  <rect x="72" y="128" width="1056" height="96" fill="url(#grid)" />
  <path d="M92 152H230V184H390V216H552V184H718V152H874V184H1020V152H1104" stroke="#0F172A" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M92 152H230V184H390V216H552V184H718V152H874V184H1020V152H1104" stroke="url(#snake)" stroke-width="13" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="44 24" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="0;-272" dur="4s" repeatCount="indefinite" />
  </path>
  <circle r="17" fill="#22C55E" filter="url(#glow)">
    <animateMotion dur="6.5s" repeatCount="indefinite" path="M92 152H230V184H390V216H552V184H718V152H874V184H1020V152H1104" />
  </circle>
  <circle cx="1064" cy="268" r="5" fill="#38BDF8">
    <animate attributeName="opacity" values="0.25;1;0.25" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="1088" cy="268" r="5" fill="#22C55E">
    <animate attributeName="opacity" values="1;0.25;1" dur="2.4s" repeatCount="indefinite" />
  </circle>
  <circle cx="1112" cy="268" r="5" fill="#FBBF24">
    <animate attributeName="opacity" values="0.25;1;0.25" dur="2.8s" repeatCount="indefinite" />
  </circle>
</svg>
