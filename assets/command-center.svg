<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 360">
<defs>
<style>
@keyframes tw{0%,100%{opacity:1}50%{opacity:.1}}
@keyframes nf{0%,100%{transform:translateY(0px)}50%{transform:translateY(-9px)}}
@keyframes gl1{0%,87%,100%{opacity:0;transform:translateX(0)}88%{opacity:.85;transform:translateX(-7px)}89%{opacity:.6;transform:translateX(5px)}90%{opacity:0}}
@keyframes gl2{0%,90%,100%{opacity:0;transform:translateX(0)}91%{opacity:.75;transform:translateX(6px)}92%{opacity:0}}
@keyframes scan{0%{transform:translateY(-8px);opacity:.35}100%{transform:translateY(368px);opacity:.05}}
@keyframes bd1{0%{stroke-dashoffset:900}100%{stroke-dashoffset:0}}
@keyframes bd2{0%{stroke-dashoffset:0}100%{stroke-dashoffset:-900}}
@keyframes cf{0%,100%{opacity:.25;transform:translateY(0)}50%{opacity:.65;transform:translateY(-11px)}}
@keyframes cp{0%,100%{opacity:.4}50%{opacity:1}}
@keyframes gp{0%,100%{opacity:.2}50%{opacity:.55}}
@keyframes sub{0%{opacity:0;letter-spacing:20px}100%{opacity:1;letter-spacing:7px}}
@keyframes pr{0%{transform:translateY(0) scale(0);opacity:0}12%{opacity:.9;transform:translateY(-20px) scale(1)}88%{opacity:.4}100%{transform:translateY(-200px) scale(0);opacity:0}}
@keyframes gflow{0%{stroke-dashoffset:24}100%{stroke-dashoffset:0}}
@keyframes rglow{0%,100%{opacity:.08}50%{opacity:.2}}
@keyframes tagp{0%,100%{opacity:.35}50%{opacity:.85}}
.star{animation:tw var(--d,3s) ease-in-out infinite;animation-delay:var(--e,0s)}
.nf{animation:nf 4s ease-in-out infinite;transform-origin:450px 145px}
.gl1{animation:gl1 7s ease-in-out infinite;animation-delay:.1s}
.gl2{animation:gl2 7s ease-in-out infinite;animation-delay:.25s}
.scan{animation:scan 3.2s linear infinite}
.b1{stroke-dasharray:900;animation:bd1 5s linear infinite}
.b2{stroke-dasharray:900;animation:bd2 5s linear infinite;animation-delay:2.5s}
.cf{animation:cf var(--d,7s) ease-in-out infinite;animation-delay:var(--e,0s)}
.corner{animation:cp 2.8s ease-in-out infinite;animation-delay:var(--e,0s)}
.gv{stroke-dasharray:6 14;animation:gflow 1.8s linear infinite;animation-delay:var(--e,0s)}
.gh{animation:gp 4s ease-in-out infinite;animation-delay:var(--e,0s)}
.sub{animation:sub .9s ease-out .4s both}
.part{animation:pr var(--d,9s) ease-in infinite;animation-delay:var(--e,0s)}
.rg{animation:rglow 3s ease-in-out infinite}
.tag{animation:tagp var(--d,5s) ease-in-out infinite;animation-delay:var(--e,0s)}
</style>
<linearGradient id="bg" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
  <stop offset="0%" stop-color="#000814"/>
  <stop offset="100%" stop-color="#00091E"/>
</linearGradient>
<linearGradient id="gridG" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
  <stop offset="0%" stop-color="#00CCFF" stop-opacity=".8"/>
  <stop offset="100%" stop-color="#00CCFF" stop-opacity="0"/>
</linearGradient>
<linearGradient id="nameG" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
  <stop offset="0%" stop-color="#00CCFF"/>
  <stop offset="45%" stop-color="#FFFFFF"/>
  <stop offset="100%" stop-color="#A855F7"/>
</linearGradient>
<linearGradient id="lineG" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
  <stop offset="0%" stop-color="#00CCFF" stop-opacity="0"/>
  <stop offset="30%" stop-color="#00CCFF"/>
  <stop offset="70%" stop-color="#A855F7"/>
  <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
</linearGradient>
<radialGradient id="cg" cx="50%" cy="42%" r="38%">
  <stop offset="0%" stop-color="#00CCFF" stop-opacity=".14"/>
  <stop offset="100%" stop-color="#00CCFF" stop-opacity="0"/>
</radialGradient>
<radialGradient id="pg" cx="50%" cy="100%" r="50%">
  <stop offset="0%" stop-color="#A855F7" stop-opacity=".18"/>
  <stop offset="100%" stop-color="#A855F7" stop-opacity="0"/>
</radialGradient>
<filter id="sg" x="-35%" y="-35%" width="170%" height="170%">
  <feGaussianBlur stdDeviation="9" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="gg" x="-25%" y="-25%" width="150%" height="150%">
  <feGaussianBlur stdDeviation="3.5" result="b"/>
  <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
</filter>
<filter id="mg" x="-60%" y="-60%" width="220%" height="220%">
  <feGaussianBlur stdDeviation="18"/>
</filter>
<clipPath id="cl"><rect width="900" height="360" rx="12"/></clipPath>
</defs>
<g clip-path="url(#cl)">

<!-- Background layers -->
<rect width="900" height="360" fill="url(#bg)"/>
<rect width="900" height="360" fill="url(#cg)"/>
<rect x="0" y="236" width="900" height="124" fill="url(#pg)"/>

<!-- Stars - scattered avoiding center text area -->
<circle cx="22" cy="16" r="1.5" fill="#fff" class="star" style="--d:2.9s;--e:0s"/>
<circle cx="72" cy="30" r="1" fill="#cef" class="star" style="--d:3.6s;--e:.7s"/>
<circle cx="132" cy="10" r="1.5" fill="#fff" class="star" style="--d:2.2s;--e:1.3s"/>
<circle cx="192" cy="26" r="1" fill="#cef" class="star" style="--d:4.1s;--e:.4s"/>
<circle cx="255" cy="14" r="1.5" fill="#fff" class="star" style="--d:3.0s;--e:1.8s"/>
