<svg width="1280" height="220" viewBox="0 0 1280 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated developer capability matrix</title>
  <desc id="desc">Four holographic animated capability modules for frontend engineering, React, motion, and performance.</desc>
