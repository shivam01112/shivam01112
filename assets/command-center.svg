<!-- Floating code fragments - right -->
<text x="748" y="112" fill="#A855F7" font-family="'Courier New',monospace" font-size="10" class="cf" style="--d:7.5s;--e:.9s">&lt;UI /&gt;</text>
<text x="732" y="145" fill="#00CCFF" font-family="'Courier New',monospace" font-size="10" class="cf" style="--d:8.5s;--e:1.8s">tsx: strict</text>
