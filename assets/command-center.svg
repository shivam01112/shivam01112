<circle cx="886" cy="10" r="1.5" fill="#cef" class="star" style="--d:2.7s;--e:.6s"/>
<circle cx="42" cy="78" r="1" fill="#cef" class="star" style="--d:3.4s;--e:.3s"/>
<circle cx="92" cy="62" r="1.5" fill="#fff" class="star" style="--d:2.5s;--e:1.1s"/>
<circle cx="158" cy="88" r="1" fill="#cef" class="star" style="--d:3.9s;--e:.8s"/>
<circle cx="215" cy="70" r="1.5" fill="#fff" class="star" style="--d:2.2s;--e:2.1s"/>
<circle cx="842" cy="62" r="1" fill="#cef" class="star" style="--d:3.6s;--e:.5s"/>
<circle cx="878" cy="80" r="1.5" fill="#fff" class="star" style="--d:2.8s;--e:1.5s"/>
<circle cx="55" cy="195" r="1" fill="#cef" class="star" style="--d:4.0s;--e:.2s"/>
<circle cx="115" cy="182" r="1.5" fill="#fff" class="star" style="--d:2.9s;--e:.9s"/>
<circle cx="172" cy="208" r="1" fill="#cef" class="star" style="--d:3.3s;--e:1.7s"/>
<circle cx="782" cy="190" r="1.5" fill="#fff" class="star" style="--d:2.6s;--e:.4s"/>
<circle cx="838" cy="175" r="1" fill="#cef" class="star" style="--d:3.7s;--e:1.3s"/>
<circle cx="890" cy="202" r="1.5" fill="#fff" class="star" style="--d:2.1s;--e:.8s"/>
<circle cx="28" cy="140" r="1" fill="#fff" class="star" style="--d:3.5s;--e:1.0s"/>
<circle cx="862" cy="135" r="1" fill="#fff" class="star" style="--d:3.2s;--e:1.6s"/>
<circle cx="68" cy="108" r="1.5" fill="#cef" class="star" style="--d:2.8s;--e:.3s"/>
<circle cx="820" cy="108" r="1.5" fill="#cef" class="star" style="--d:3.0s;--e:1.1s"/>
<circle cx="14" cy="48" r="1" fill="#fff" class="star" style="--d:4.3s;--e:.6s"/>
<circle cx="888" cy="45" r="1" fill="#fff" class="star" style="--d:2.3s;--e:1.9s"/>

<!-- Floating code fragments - left -->
<text x="28" y="110" fill="#00FF88" font-family="'Courier New',monospace" font-size="11" class="cf" style="--d:7s;--e:0s">const shivam =</text>
<text x="18" y="143" fill="#00CCFF" font-family="'Courier New',monospace" font-size="10" class="cf" style="--d:8s;--e:1.2s">  React.developer()</text>
<text x="28" y="174" fill="#A855F7" font-family="'Courier New',monospace" font-size="10" class="cf" style="--d:9s;--e:2.4s">import {magic}</text>
