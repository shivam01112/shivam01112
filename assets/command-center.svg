<circle cx="188" cy="308" r="2.5" fill="#00CCFF" class="part" style="--d:8s;--e:0s"/>
<circle cx="285" cy="328" r="1.8" fill="#A855F7" class="part" style="--d:9.5s;--e:1.6s"/>
