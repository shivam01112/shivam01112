<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Shivam Negi frontend developer hero</title>
  <desc id="desc">Animated profile hero with neon waves, code particles, and frontend developer title.</desc>
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030712" />
      <stop offset="0.32" stop-color="#082F49" />
      <stop offset="0.68" stop-color="#134E4A" />
      <stop offset="1" stop-color="#064E3B" />
      <animate attributeName="x1" values="0;120;0" dur="8s" repeatCount="indefinite" />
      <animate attributeName="x2" values="1200;1080;1200" dur="8s" repeatCount="indefinite" />
    </linearGradient>
    <linearGradient id="lineGrad" x1="90" y1="70" x2="1110" y2="350" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" />
      <stop offset="0.5" stop-color="#A3E635" />
      <stop offset="1" stop-color="#FBBF24" />
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <pattern id="dotGrid" width="36" height="36" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="1.8" fill="#E0F2FE" opacity="0.18" />
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="34" fill="url(#heroBg)" />
  <rect width="1200" height="420" rx="34" fill="url(#dotGrid)" />

  <circle cx="170" cy="90" r="120" fill="#38BDF8" opacity="0.10">
    <animate attributeName="r" values="95;135;95" dur="7s" repeatCount="indefinite" />
  </circle>
  <circle cx="995" cy="315" r="155" fill="#22C55E" opacity="0.12">
    <animate attributeName="r" values="130;172;130" dur="8s" repeatCount="indefinite" />
  </circle>
  <circle cx="880" cy="80" r="82" fill="#F59E0B" opacity="0.10">
    <animate attributeName="cy" values="80;108;80" dur="6s" repeatCount="indefinite" />
  </circle>

  <path d="M55 324C210 250 310 380 468 294C650 196 756 272 884 218C1010 166 1092 204 1160 166" stroke="url(#lineGrad)" stroke-width="5" stroke-linecap="round" stroke-dasharray="18 22" opacity="0.88" filter="url(#softGlow)">
    <animate attributeName="stroke-dashoffset" values="0;-240" dur="5.5s" repeatCount="indefinite" />
  </path>
  <path d="M80 105C232 165 300 44 455 104C628 170 722 64 890 118C1012 158 1078 104 1145 78" stroke="#67E8F9" stroke-width="2" stroke-linecap="round" opacity="0.32">
    <animate attributeName="stroke-dashoffset" values="0;180" dur="7s" repeatCount="indefinite" />
  </path>

  <g transform="translate(84 70)">
    <rect width="190" height="58" rx="18" fill="#020617" opacity="0.64" stroke="#164E63" />
    <text x="28" y="37" fill="#A7F3D0" font-family="Consolas, monospace" font-size="19" font-weight="700">&lt;React /&gt;</text>
    <animateTransform attributeName="transform" type="translate" values="84 70;84 58;84 70" dur="4.8s" repeatCount="indefinite" />
  </g>

  <g transform="translate(928 76)">
    <rect width="184" height="58" rx="18" fill="#020617" opacity="0.62" stroke="#166534" />
    <text x="30" y="37" fill="#FEF3C7" font-family="Consolas, monospace" font-size="19" font-weight="700">UI.motion()</text>
    <animateTransform attributeName="transform" type="translate" values="928 76;928 91;928 76" dur="5.2s" repeatCount="indefinite" />
  </g>

  <text x="600" y="174" text-anchor="middle" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="900" letter-spacing="1">Shivam Negi</text>
  <text x="600" y="223" text-anchor="middle" fill="#BAE6FD" font-family="Inter, Arial, sans-serif" font-size="26" font-weight="800">Frontend Developer</text>
  <text x="600" y="263" text-anchor="middle" fill="#ECFEFF" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600">React - JavaScript - Tailwind CSS - Responsive Interfaces</text>

  <g transform="translate(354 302)">
    <rect width="492" height="54" rx="27" fill="#020617" opacity="0.54" stroke="#155E75" />
    <text x="53" y="35" fill="#22D3EE" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">COMPONENTS</text>
    <text x="205" y="35" fill="#86EFAC" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">PIXEL POLISH</text>
    <text x="375" y="35" fill="#FDE68A" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">FAST UI</text>
  </g>
</svg>
