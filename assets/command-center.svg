<svg width="1280" height="560" viewBox="0 0 1280 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Shivam Negi command center</title>
  <desc id="desc">A premium animated frontend developer command center hero.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617" />
      <stop offset="0.34" stop-color="#061B34" />
      <stop offset="0.68" stop-color="#042F2E" />
      <stop offset="1" stop-color="#111827" />
      <animate attributeName="x1" values="0;120;0" dur="9s" repeatCount="indefinite" />
      <animate attributeName="x2" values="1280;1140;1280" dur="9s" repeatCount="indefinite" />
    </linearGradient>
    <linearGradient id="neon" x1="90" y1="82" x2="1190" y2="478" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" />
      <stop offset="0.35" stop-color="#38BDF8" />
      <stop offset="0.68" stop-color="#22C55E" />
      <stop offset="1" stop-color="#FBBF24" />
    </linearGradient>
    <linearGradient id="pink" x1="0" y1="0" x2="360" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" />
      <stop offset="0.6" stop-color="#A78BFA" />
      <stop offset="1" stop-color="#FB7185" />
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#334155" stroke-width="1" opacity="0.18" />
      <circle cx="2" cy="2" r="1.6" fill="#E0F2FE" opacity="0.22" />
    </pattern>
    <filter id="glow" x="-40%" y="-60%" width="180%" height="220%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020617" flood-opacity="0.55" />
    </filter>
  </defs>

  <rect width="1280" height="560" rx="34" fill="url(#bg)" />
  <rect width="1280" height="560" rx="34" fill="url(#grid)" />

  <circle cx="1054" cy="108" r="118" fill="#22C55E" opacity="0.11">
    <animate attributeName="r" values="92;132;92" dur="7s" repeatCount="indefinite" />
  </circle>
  <circle cx="178" cy="450" r="150" fill="#38BDF8" opacity="0.10">
    <animate attributeName="r" values="126;164;126" dur="8s" repeatCount="indefinite" />
  </circle>
  <circle cx="782" cy="444" r="86" fill="#FB7185" opacity="0.08">
    <animate attributeName="cy" values="444;410;444" dur="6.4s" repeatCount="indefinite" />
  </circle>

  <path d="M48 414C170 334 270 470 406 370C552 262 650 410 786 308C910 216 1034 290 1228 194" stroke="url(#neon)" stroke-width="6" stroke-linecap="round" stroke-dasharray="22 24" opacity="0.84" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="0;-276" dur="5s" repeatCount="indefinite" />
  </path>
  <path d="M72 124C202 210 342 74 476 144C622 222 738 98 896 152C1034 198 1132 142 1210 98" stroke="#67E8F9" stroke-width="2" stroke-linecap="round" opacity="0.36">
    <animate attributeName="stroke-dashoffset" values="0;220" dur="6.2s" repeatCount="indefinite" />
  </path>

  <g transform="translate(80 78)" filter="url(#softShadow)">
    <rect width="470" height="318" rx="28" fill="#020617" opacity="0.78" stroke="#1E3A4C" />
    <rect width="470" height="58" rx="28" fill="#0F172A" />
    <circle cx="34" cy="29" r="7" fill="#EF4444" />
    <circle cx="58" cy="29" r="7" fill="#FBBF24" />
    <circle cx="82" cy="29" r="7" fill="#22C55E" />
    <text x="112" y="36" fill="#94A3B8" font-family="Consolas, monospace" font-size="17">profile.command.tsx</text>
    <text x="30" y="100" fill="#38BDF8" font-family="Consolas, monospace" font-size="18">const developer = {</text>
    <text x="58" y="136" fill="#E2E8F0" font-family="Consolas, monospace" font-size="18">name: "Shivam Negi",</text>
    <text x="58" y="172" fill="#E2E8F0" font-family="Consolas, monospace" font-size="18">role: "Frontend Developer",</text>
    <text x="58" y="208" fill="#E2E8F0" font-family="Consolas, monospace" font-size="18">stack: ["React", "JS", "UI"],</text>
    <text x="58" y="244" fill="#E2E8F0" font-family="Consolas, monospace" font-size="18">mode: "build-polish-ship"</text>
    <text x="30" y="280" fill="#38BDF8" font-family="Consolas, monospace" font-size="18">}</text>
    <rect x="58" y="292" width="11" height="24" rx="3" fill="#22C55E">
      <animate attributeName="opacity" values="1;0.15;1" dur="1s" repeatCount="indefinite" />
    </rect>
  </g>

  <g transform="translate(625 82)">
    <text x="0" y="44" fill="#67E8F9" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">FRONTEND ENGINEERING PROFILE</text>
    <text x="0" y="118" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="900">Shivam</text>
    <text x="0" y="196" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="900">Negi</text>
    <text x="4" y="246" fill="#D1FAE5" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="800">React focused. UI driven. Detail obsessed.</text>

    <g transform="translate(2 286)">
      <rect width="150" height="48" rx="16" fill="#082F49" stroke="#0EA5E9" />
      <text x="28" y="31" fill="#E0F2FE" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">COMPONENTS</text>
      <animateTransform attributeName="transform" type="translate" values="2 286;2 276;2 286" dur="4.6s" repeatCount="indefinite" />
    </g>
    <g transform="translate(172 286)">
      <rect width="142" height="48" rx="16" fill="#052E2B" stroke="#22C55E" />
      <text x="28" y="31" fill="#DCFCE7" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">RESPONSIVE</text>
      <animateTransform attributeName="transform" type="translate" values="172 286;172 298;172 286" dur="5s" repeatCount="indefinite" />
    </g>
    <g transform="translate(334 286)">
      <rect width="120" height="48" rx="16" fill="#422006" stroke="#FBBF24" />
      <text x="28" y="31" fill="#FEF3C7" font-family="Inter, Arial, sans-serif" font-size="15" font-weight="900">MOTION</text>
      <animateTransform attributeName="transform" type="translate" values="334 286;334 276;334 286" dur="4.8s" repeatCount="indefinite" />
    </g>
  </g>

  <g transform="translate(625 438)">
    <rect width="470" height="64" rx="22" fill="#020617" opacity="0.72" stroke="#155E75" />
    <text x="26" y="39" fill="#BAE6FD" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="900">CURRENT MODE</text>
    <text x="176" y="39" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="21" font-weight="900">build -> refine -> ship</text>
  </g>

  <circle r="9" fill="#22C55E" filter="url(#glow)">
    <animateMotion dur="6.8s" repeatCount="indefinite" path="M48 414C170 334 270 470 406 370C552 262 650 410 786 308C910 216 1034 290 1228 194" />
  </circle>
</svg>
