<svg width="1200" height="520" viewBox="0 0 1200 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">About Shivam Negi</title>
  <desc id="desc">Animated profile panel describing Shivam Negi as a frontend developer.</desc>
  <defs>
    <linearGradient id="panelBg" x1="0" y1="0" x2="1200" y2="520" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617" />
      <stop offset="0.55" stop-color="#071B2D" />
      <stop offset="1" stop-color="#042F2E" />
    </linearGradient>
    <linearGradient id="cardGrad" x1="96" y1="82" x2="590" y2="422" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0EA5E9" />
      <stop offset="1" stop-color="#22C55E" />
    </linearGradient>
    <linearGradient id="accent" x1="670" y1="120" x2="1080" y2="396" gradientUnits="userSpaceOnUse">
      <stop stop-color="#22D3EE" />
      <stop offset="0.52" stop-color="#22C55E" />
      <stop offset="1" stop-color="#FBBF24" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-40%" width="160%" height="180%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="520" rx="30" fill="url(#panelBg)" />
  <rect x="36" y="36" width="1128" height="448" rx="28" fill="#030712" opacity="0.55" stroke="#1E3A4C" />

  <g transform="translate(84 82)">
    <text x="0" y="34" fill="#67E8F9" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800">ABOUT ME</text>
    <text x="0" y="92" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900">I build frontends that feel clean,</text>
    <text x="0" y="138" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="38" font-weight="900">fast, and easy to use.</text>
    <text x="0" y="188" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">I am a React-focused frontend developer who enjoys</text>
    <text x="0" y="218" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">turning ideas into responsive interfaces with smooth</text>
    <text x="0" y="248" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">interactions, clear structure, and thoughtful details.</text>

    <g transform="translate(0 296)">
      <rect width="145" height="46" rx="15" fill="#082F49" stroke="#0EA5E9" />
      <text x="26" y="30" fill="#BAE6FD" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">React UI</text>
    </g>
    <g transform="translate(162 296)">
      <rect width="190" height="46" rx="15" fill="#052E2B" stroke="#22C55E" />
      <text x="25" y="30" fill="#BBF7D0" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">Responsive Layouts</text>
    </g>
    <g transform="translate(372 296)">
      <rect width="154" height="46" rx="15" fill="#422006" stroke="#F59E0B" />
      <text x="27" y="30" fill="#FDE68A" font-family="Inter, Arial, sans-serif" font-size="16" font-weight="800">UX Polish</text>
    </g>
  </g>

  <g transform="translate(660 82)">
    <rect x="0" y="0" width="420" height="288" rx="28" fill="#F8FAFC" />
    <rect x="0" y="0" width="420" height="58" rx="28" fill="#E2E8F0" />
    <circle cx="33" cy="29" r="7" fill="#EF4444" />
    <circle cx="57" cy="29" r="7" fill="#F59E0B" />
    <circle cx="81" cy="29" r="7" fill="#22C55E" />
    <rect x="30" y="90" width="150" height="22" rx="11" fill="#0F172A" />
    <rect x="30" y="132" width="292" height="14" rx="7" fill="#CBD5E1" />
    <rect x="30" y="162" width="245" height="14" rx="7" fill="#CBD5E1" />
    <rect x="30" y="206" width="144" height="54" rx="18" fill="#DBEAFE" />
    <rect x="196" y="206" width="144" height="54" rx="18" fill="#DCFCE7" />
    <circle cx="354" cy="92" r="24" fill="url(#accent)" filter="url(#glow)">
      <animate attributeName="r" values="18;26;18" dur="2.5s" repeatCount="indefinite" />
    </circle>
  </g>

  <path d="M640 230C720 148 780 290 858 206C930 128 1000 174 1088 108" stroke="url(#accent)" stroke-width="6" stroke-linecap="round" stroke-dasharray="16 18" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="0;-170" dur="3.6s" repeatCount="indefinite" />
  </path>
  <circle r="9" fill="#22C55E" filter="url(#glow)">
    <animateMotion dur="4.5s" repeatCount="indefinite" path="M640 230C720 148 780 290 858 206C930 128 1000 174 1088 108" />
  </circle>
</svg>
