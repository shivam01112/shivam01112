<svg width="1200" height="540" viewBox="0 0 1200 540" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Frontend stack roadmap</title>
  <desc id="desc">A colorful animated roadmap of frontend tools and skills.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="540" gradientUnits="userSpaceOnUse">
      <stop stop-color="#030712" />
      <stop offset="0.48" stop-color="#0F172A" />
      <stop offset="1" stop-color="#052E2B" />
    </linearGradient>
    <linearGradient id="route" x1="90" y1="268" x2="1110" y2="268" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" />
      <stop offset="0.4" stop-color="#22C55E" />
      <stop offset="0.74" stop-color="#FBBF24" />
      <stop offset="1" stop-color="#FB7185" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-50%" width="160%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="540" rx="30" fill="url(#bg)" />
  <text x="72" y="86" fill="#67E8F9" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">FRONTEND STACK</text>
  <text x="72" y="138" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="900">From structure to polished interface</text>
  <text x="72" y="174" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="20">A practical stack for building responsive React applications.</text>

  <path d="M98 278H1102" stroke="#1E293B" stroke-width="18" stroke-linecap="round" />
  <path d="M98 278H1102" stroke="url(#route)" stroke-width="8" stroke-linecap="round" stroke-dasharray="28 20" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="0;-192" dur="3.8s" repeatCount="indefinite" />
  </path>

  <g transform="translate(72 220)">
    <g>
      <rect width="160" height="150" rx="22" fill="#082F49" stroke="#0EA5E9" />
      <circle cx="80" cy="58" r="21" fill="#38BDF8" opacity="0.9" />
      <text x="80" y="104" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Core</text>
      <text x="80" y="130" text-anchor="middle" fill="#BAE6FD" font-family="Inter, Arial, sans-serif" font-size="14">HTML CSS JS TS</text>
    </g>
    <g transform="translate(188 0)">
      <rect width="160" height="150" rx="22" fill="#1E1B4B" stroke="#60A5FA" />
      <circle cx="80" cy="58" r="21" fill="#60A5FA" opacity="0.9" />
      <text x="80" y="104" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">React</text>
      <text x="80" y="130" text-anchor="middle" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="14">hooks router UI</text>
    </g>
    <g transform="translate(376 0)">
      <rect width="160" height="150" rx="22" fill="#052E2B" stroke="#22C55E" />
      <circle cx="80" cy="58" r="21" fill="#22C55E" opacity="0.9" />
      <text x="80" y="104" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Styling</text>
      <text x="80" y="130" text-anchor="middle" fill="#BBF7D0" font-family="Inter, Arial, sans-serif" font-size="14">Tailwind Bootstrap</text>
    </g>
    <g transform="translate(564 0)">
      <rect width="160" height="150" rx="22" fill="#422006" stroke="#FBBF24" />
      <circle cx="80" cy="58" r="21" fill="#FBBF24" opacity="0.9" />
      <text x="80" y="104" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Data</text>
      <text x="80" y="130" text-anchor="middle" fill="#FDE68A" font-family="Inter, Arial, sans-serif" font-size="14">APIs state forms</text>
    </g>
    <g transform="translate(752 0)">
      <rect width="160" height="150" rx="22" fill="#0F172A" stroke="#94A3B8" />
      <circle cx="80" cy="58" r="21" fill="#94A3B8" opacity="0.9" />
      <text x="80" y="104" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Tooling</text>
      <text x="80" y="130" text-anchor="middle" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="14">Vite Git npm</text>
    </g>
    <g transform="translate(940 0)">
      <rect width="160" height="150" rx="22" fill="#4C0519" stroke="#FB7185" />
      <circle cx="80" cy="58" r="21" fill="#FB7185" opacity="0.9" />
      <text x="80" y="104" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">Polish</text>
      <text x="80" y="130" text-anchor="middle" fill="#FFE4E6" font-family="Inter, Arial, sans-serif" font-size="14">motion UX a11y</text>
    </g>
  </g>

  <circle r="13" fill="#22D3EE" filter="url(#glow)">
    <animateMotion dur="6s" repeatCount="indefinite" path="M98 278H1102" />
  </circle>
</svg>
