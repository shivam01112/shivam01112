<g opacity=".7">
  <line x1="450" y1="242" x2="0" y2="360" stroke="url(#gridG)" stroke-width=".8" class="gv" style="--e:0s"/>
  <line x1="450" y1="242" x2="82" y2="360" stroke="url(#gridG)" stroke-width=".8" class="gv" style="--e:.1s"/>
