<svg width="1200" height="210" viewBox="0 0 1200 210" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated profile footer</title>
  <desc id="desc">A dark animated footer with neon waves.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617" />
      <stop offset="0.52" stop-color="#082F49" />
      <stop offset="1" stop-color="#064E3B" />
    </linearGradient>
    <linearGradient id="wave" x1="80" y1="120" x2="1120" y2="120" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" />
      <stop offset="0.5" stop-color="#22C55E" />
      <stop offset="1" stop-color="#FBBF24" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-60%" width="160%" height="220%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="210" rx="28" fill="url(#bg)" />
  <path d="M0 130C158 82 286 164 442 118C640 60 760 154 930 112C1050 82 1126 94 1200 74V210H0V130Z" fill="#020617" opacity="0.38">
    <animate attributeName="d" values="M0 130C158 82 286 164 442 118C640 60 760 154 930 112C1050 82 1126 94 1200 74V210H0V130Z;M0 106C158 154 286 86 442 130C640 184 760 82 930 122C1050 150 1126 126 1200 98V210H0V106Z;M0 130C158 82 286 164 442 118C640 60 760 154 930 112C1050 82 1126 94 1200 74V210H0V130Z" dur="8s" repeatCount="indefinite" />
  </path>
  <path d="M74 112C224 60 330 146 488 106C642 66 762 130 914 96C1042 68 1116 86 1160 70" stroke="url(#wave)" stroke-width="5" stroke-linecap="round" stroke-dasharray="22 20" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="0;-252" dur="4.4s" repeatCount="indefinite" />
  </path>
  <text x="600" y="72" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="900">Thanks for visiting my profile</text>
  <text x="600" y="112" text-anchor="middle" fill="#BAE6FD" font-family="Inter, Arial, sans-serif" font-size="17" font-weight="600">Open to frontend projects, learning, and collaboration</text>
</svg>
