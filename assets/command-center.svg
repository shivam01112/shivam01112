  <line x1="450" y1="242" x2="246" y2="360" stroke="url(#gridG)" stroke-width=".9" class="gv" style="--e:.15s"/>
  <line x1="450" y1="242" x2="348" y2="360" stroke="url(#gridG)" stroke-width="1" class="gv" style="--e:.05s"/>
  <line x1="450" y1="242" x2="450" y2="360" stroke="url(#gridG)" stroke-width="1.2" class="gv" style="--e:0s"/>
  <line x1="450" y1="242" x2="552" y2="360" stroke="url(#gridG)" stroke-width="1" class="gv" style="--e:.05s"/>
  <line x1="450" y1="242" x2="654" y2="360" stroke="url(#gridG)" stroke-width=".9" class="gv" style="--e:.15s"/>
  <line x1="450" y1="242" x2="736" y2="360" stroke="url(#gridG)" stroke-width=".9" class="gv" style="--e:.2s"/>
  <line x1="450" y1="242" x2="818" y2="360" stroke="url(#gridG)" stroke-width=".8" class="gv" style="--e:.1s"/>
  <line x1="450" y1="242" x2="900" y2="360" stroke="url(#gridG)" stroke-width=".8" class="gv" style="--e:0s"/>
</g>
<!-- Horizontal perspective lines -->
<line x1="422" y1="250" x2="478" y2="250" stroke="#00CCFF" stroke-width=".6" opacity=".28" class="gh" style="--e:.1s"/>
<line x1="383" y1="260" x2="517" y2="260" stroke="#00CCFF" stroke-width=".6" opacity=".34" class="gh" style="--e:.2s"/>
<line x1="328" y1="272" x2="572" y2="272" stroke="#00CCFF" stroke-width=".7" opacity=".40" class="gh" style="--e:.3s"/>
<line x1="256" y1="288" x2="644" y2="288" stroke="#00CCFF" stroke-width=".8" opacity=".46" class="gh" style="--e:.4s"/>
<line x1="162" y1="308" x2="738" y2="308" stroke="#00CCFF" stroke-width=".9" opacity=".52" class="gh" style="--e:.5s"/>
<line x1="44" y1="332" x2="856" y2="332" stroke="#00CCFF" stroke-width="1" opacity=".38" class="gh" style="--e:.6s"/>
<line x1="0" y1="356" x2="900" y2="356" stroke="#00CCFF" stroke-width=".8" opacity=".18" class="gh" style="--e:.7s"/>

<!-- CENTER GLOW HALOS -->
<ellipse cx="450" cy="145" rx="280" ry="130" fill="#00CCFF" opacity=".05" filter="url(#mg)"/>
<ellipse cx="450" cy="145" rx="160" ry="75" fill="#A855F7" opacity=".07" filter="url(#mg)"/>

<!-- Name background mega-glow -->
<text x="450" y="162" text-anchor="middle" font-family="'Arial Black',Impact,sans-serif" font-size="70" font-weight="900" fill="#00CCFF" opacity=".12" filter="url(#mg)" letter-spacing="2">SHIVAM NEGI</text>

<!-- Floating name group -->
<g class="nf">
  <!-- Main name gradient -->
  <text x="450" y="162" text-anchor="middle" font-family="'Arial Black',Impact,sans-serif" font-size="70" font-weight="900" fill="url(#nameG)" letter-spacing="2" filter="url(#sg)">SHIVAM NEGI</text>
  <!-- Glitch layer cyan -->
  <text x="450" y="162" text-anchor="middle" font-family="'Arial Black',Impact,sans-serif" font-size="70" font-weight="900" fill="#00FFFF" letter-spacing="2" class="gl1">SHIVAM NEGI</text>
  <!-- Glitch layer magenta -->
  <text x="450" y="162" text-anchor="middle" font-family="'Arial Black',Impact,sans-serif" font-size="70" font-weight="900" fill="#FF00AA" letter-spacing="2" class="gl2">SHIVAM NEGI</text>
</g>

<!-- Divider line under name -->
<rect x="165" y="174" width="570" height="1.5" fill="url(#lineG)" filter="url(#gg)"/>

<!-- Subtitle -->
<text x="450" y="204" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" fill="#00CCFF" class="sub" letter-spacing="7">FRONTEND DEVELOPER</text>

<!-- Tech pills row -->
