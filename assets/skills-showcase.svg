<svg width="1200" height="560" viewBox="0 0 1200 560" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Frontend skill lab</title>
  <desc id="desc">Animated frontend skills in colorful cards.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#020617" />
      <stop offset="0.5" stop-color="#081827" />
      <stop offset="1" stop-color="#022C22" />
    </linearGradient>
    <linearGradient id="ring" x1="220" y1="90" x2="980" y2="470" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8" />
      <stop offset="0.45" stop-color="#22C55E" />
      <stop offset="1" stop-color="#FBBF24" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="560" rx="30" fill="url(#bg)" />
  <rect x="42" y="42" width="1116" height="476" rx="26" fill="#030712" opacity="0.62" stroke="#1E3A4C" />

  <text x="76" y="96" fill="#67E8F9" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">SKILL LAB</text>
  <text x="76" y="145" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="40" font-weight="900">Frontend tools I use to build polished web apps</text>

  <g opacity="0.55">
    <circle cx="1040" cy="104" r="54" stroke="url(#ring)" stroke-width="3" stroke-dasharray="12 12">
      <animateTransform attributeName="transform" type="rotate" from="0 1040 104" to="360 1040 104" dur="14s" repeatCount="indefinite" />
    </circle>
    <circle cx="1010" cy="420" r="76" stroke="url(#ring)" stroke-width="2" stroke-dasharray="8 15">
      <animateTransform attributeName="transform" type="rotate" from="360 1010 420" to="0 1010 420" dur="16s" repeatCount="indefinite" />
    </circle>
  </g>

  <g transform="translate(82 205)">
    <g>
      <rect width="190" height="112" rx="22" fill="#082F49" stroke="#0EA5E9" />
      <text x="28" y="50" fill="#E0F2FE" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900">React</text>
      <text x="28" y="80" fill="#7DD3FC" font-family="Inter, Arial, sans-serif" font-size="15">components</text>
    </g>
    <g transform="translate(212 0)">
      <rect width="190" height="112" rx="22" fill="#422006" stroke="#FBBF24" />
      <text x="28" y="50" fill="#FEF3C7" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900">JS</text>
      <text x="28" y="80" fill="#FDE68A" font-family="Inter, Arial, sans-serif" font-size="15">logic and DOM</text>
    </g>
    <g transform="translate(424 0)">
      <rect width="190" height="112" rx="22" fill="#1E1B4B" stroke="#60A5FA" />
      <text x="28" y="50" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900">TypeScript</text>
      <text x="28" y="80" fill="#BFDBFE" font-family="Inter, Arial, sans-serif" font-size="15">typed frontend</text>
    </g>
    <g transform="translate(636 0)">
      <rect width="190" height="112" rx="22" fill="#052E2B" stroke="#22C55E" />
      <text x="28" y="50" fill="#DCFCE7" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900">Tailwind</text>
      <text x="28" y="80" fill="#BBF7D0" font-family="Inter, Arial, sans-serif" font-size="15">fast styling</text>
    </g>
    <g transform="translate(848 0)">
      <rect width="190" height="112" rx="22" fill="#172554" stroke="#38BDF8" />
      <text x="28" y="50" fill="#E0F2FE" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900">Vite</text>
      <text x="28" y="80" fill="#BAE6FD" font-family="Inter, Arial, sans-serif" font-size="15">dev tooling</text>
    </g>

    <g transform="translate(0 144)">
      <rect width="190" height="112" rx="22" fill="#7F1D1D" stroke="#F97316" />
      <text x="28" y="50" fill="#FFEDD5" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900">HTML5</text>
      <text x="28" y="80" fill="#FED7AA" font-family="Inter, Arial, sans-serif" font-size="15">structure</text>
    </g>
    <g transform="translate(212 144)">
      <rect width="190" height="112" rx="22" fill="#172554" stroke="#38BDF8" />
      <text x="28" y="50" fill="#DBEAFE" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900">CSS3</text>
      <text x="28" y="80" fill="#BAE6FD" font-family="Inter, Arial, sans-serif" font-size="15">layouts</text>
    </g>
    <g transform="translate(424 144)">
      <rect width="190" height="112" rx="22" fill="#1E1B4B" stroke="#A78BFA" />
      <text x="28" y="50" fill="#EDE9FE" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900">Redux</text>
      <text x="28" y="80" fill="#DDD6FE" font-family="Inter, Arial, sans-serif" font-size="15">state basics</text>
    </g>
    <g transform="translate(636 144)">
      <rect width="190" height="112" rx="22" fill="#111827" stroke="#94A3B8" />
      <text x="28" y="50" fill="#F8FAFC" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900">GitHub</text>
      <text x="28" y="80" fill="#CBD5E1" font-family="Inter, Arial, sans-serif" font-size="15">version control</text>
    </g>
    <g transform="translate(848 144)">
      <rect width="190" height="112" rx="22" fill="#0F172A" stroke="#22C55E" />
      <text x="28" y="50" fill="#DCFCE7" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="900">Figma</text>
      <text x="28" y="80" fill="#BBF7D0" font-family="Inter, Arial, sans-serif" font-size="15">design sense</text>
    </g>
  </g>

  <path d="M87 188H1078" stroke="url(#ring)" stroke-width="4" stroke-linecap="round" stroke-dasharray="24 18" filter="url(#glow)">
    <animate attributeName="stroke-dashoffset" values="0;-252" dur="4.2s" repeatCount="indefinite" />
  </path>
</svg>
