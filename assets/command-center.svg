  <text x="417" y="232" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#00FF88">⚡ Vite</text>
</g>
<g class="tag" style="--d:7s;--e:1.2s">
  <rect x="458" y="218" width="78" height="20" rx="10" fill="#06B6D4" fill-opacity=".1" stroke="#06B6D4" stroke-width=".8" stroke-opacity=".5"/>
  <text x="497" y="232" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#06B6D4">🌊 Tailwind</text>
</g>
<g class="tag" style="--d:5s;--e:1.6s">
  <rect x="544" y="218" width="78" height="20" rx="10" fill="#F7DF1E" fill-opacity=".08" stroke="#F7DF1E" stroke-width=".8" stroke-opacity=".4"/>
  <text x="583" y="232" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#F7DF1E">JS JavaScript</text>
</g>

<!-- CORNER BRACKETS -->
<!-- Top-left -->
<g class="corner" style="--e:0s" filter="url(#gg)">
  <line x1="12" y1="12" x2="12" y2="52" stroke="#00CCFF" stroke-width="2.5"/>
  <line x1="12" y1="12" x2="52" y2="12" stroke="#00CCFF" stroke-width="2.5"/>
  <circle cx="12" cy="12" r="2.5" fill="#00CCFF"/>
</g>
