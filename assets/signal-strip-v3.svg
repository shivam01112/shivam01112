    <linearGradient id="spectrum" x1="38" y1="0" x2="1242" y2="0"><stop stop-color="#22D3EE"/><stop offset=".26" stop-color="#38BDF8"/><stop offset=".52" stop-color="#A78BFA"/><stop offset=".76" stop-color="#22C55E"/><stop offset="1" stop-color="#FBBF24"/></linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#10243B" stop-opacity=".94"/><stop offset=".55" stop-color="#07101F" stop-opacity=".92"/><stop offset="1" stop-color="#0B1723" stop-opacity=".9"/></linearGradient>
