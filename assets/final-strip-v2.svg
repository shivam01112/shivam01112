<svg width="1280" height="280" viewBox="0 0 1280 280" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Animated closing transmission</title><desc id="desc">A cinematic animated closing message with neon waves and orbiting particles.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="280"><stop stop-color="#020617"/><stop offset=".5" stop-color="#071D37"/><stop offset="1" stop-color="#064E3B"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1280" y2="0"><stop stop-color="#22D3EE"/><stop offset=".36" stop-color="#38BDF8"/><stop offset=".62" stop-color="#A78BFA"/><stop offset=".8" stop-color="#22C55E"/><stop offset="1" stop-color="#FBBF24"/></linearGradient>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse"><path d="M34 0H0V34" stroke="#7DD3FC" stroke-width=".5" opacity=".08"/></pattern>
    <filter id="glow" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="8" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="1280" height="280" rx="32" fill="url(#bg)"/><rect width="1280" height="280" rx="32" fill="url(#grid)"/><rect x="1" y="1" width="1278" height="278" rx="31" stroke="url(#line)" stroke-opacity=".3"/>
  <circle cx="160" cy="158" r="110" fill="#0EA5E9" opacity=".05"><animate attributeName="r" values="90;135;90" dur="7s" repeatCount="indefinite"/></circle><circle cx="1120" cy="126" r="120" fill="#22C55E" opacity=".06"><animate attributeName="r" values="132;92;132" dur="8s" repeatCount="indefinite"/></circle>
  <path d="M0 198C176 130 320 226 498 172C678 118 810 216 978 164C1114 122 1194 142 1280 108V280H0V198Z" fill="#020617" opacity=".36"><animate attributeName="d" values="M0 198C176 130 320 226 498 172C678 118 810 216 978 164C1114 122 1194 142 1280 108V280H0V198Z;M0 164C178 230 326 132 500 186C680 238 810 136 978 182C1116 218 1196 174 1280 144V280H0V164Z;M0 198C176 130 320 226 498 172C678 118 810 216 978 164C1114 122 1194 142 1280 108V280H0V198Z" dur="9s" repeatCount="indefinite"/></path>
  <g transform="translate(640 68)"><text text-anchor="middle" fill="#67E8F9" font-family="Consolas, monospace" font-size="13" font-weight="800" letter-spacing="3">TRANSMISSION COMPLETE</text><text y="54" text-anchor="middle" fill="#F8FAFC" font-family="Inter, Arial" font-size="34" font-weight="900">Thanks for entering my orbit.</text><text y="91" text-anchor="middle" fill="#BAE6FD" font-family="Inter, Arial" font-size="17" font-weight="700">Let’s build something people remember.</text></g>
  <path d="M58 224C214 170 344 254 506 210C668 166 792 246 952 204C1084 168 1168 184 1222 154" stroke="url(#line)" stroke-width="5" stroke-linecap="round" stroke-dasharray="18 20" filter="url(#glow)"><animate attributeName="stroke-dashoffset" values="0;-228" dur="3.8s" repeatCount="indefinite"/></path>
  <circle r="8" fill="#fff" filter="url(#glow)"><animateMotion dur="6s" repeatCount="indefinite" path="M58 224C214 170 344 254 506 210C668 166 792 246 952 204C1084 168 1168 184 1222 154"/></circle><circle r="6" fill="#22C55E" filter="url(#glow)"><animateMotion begin="-3s" dur="6s" repeatCount="indefinite" path="M58 224C214 170 344 254 506 210C668 166 792 246 952 204C1084 168 1168 184 1222 154"/></circle>
</svg>
